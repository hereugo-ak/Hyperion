version: "3.8"

services:
  searxng:
    # Pinned to a known-good tag for reproducibility. `latest` is non-deterministic
    # and a recent build made `default_doi_resolver` mandatory (HTTP 500 without it).
    image: searxng/searxng:2024.12.10-a4d2a5f68
    container_name: searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng_settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    restart: unless-stopped

  flaresolverr:
    # Pinned for reproducibility (CAPTCHA-only fallback, not the primary SERP source).
    image: flaresolverr/flaresolverr:v3.3.21
    container_name: flaresolverr
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
